name: winner_spin
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.3.5
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - lib/images/auth_shared/
    - lib/images/login_screen/
    - lib/images/register_screen/
    - lib/images/slot_main_screen/
    - lib/images/slot_main_screen/Items/
    - lib/images/slot_main_screen/WIN_ARTICLES/
    - assets/audio/
    - assets/audio/Items/
    - assets/animations/
